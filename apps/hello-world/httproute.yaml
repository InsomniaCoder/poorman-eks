# Replace hello.example.com with your actual domain.
# Point that domain at the NLB hostname from:
#   terragrunt output -raw traefik_nlb_hostname  (from live/eu-west-1/dev/addons/)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world
  namespace: hello-world
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "hello.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello-world
          port: 80
